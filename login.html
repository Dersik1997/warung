<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Teh Eha</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 antialiased flex items-center justify-center min-h-screen p-4 relative overflow-hidden">

    <!-- Ornamen Background -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-emerald-200 rounded-full blur-[100px] opacity-40"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-200 rounded-full blur-[100px] opacity-40"></div>

    <!-- Kotak Login -->
    <div class="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-2xl shadow-emerald-900/5 border border-slate-100 w-full max-w-md relative z-10">
        
        <!-- Logo -->
        <div class="flex flex-col items-center justify-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-tr from-emerald-500 to-green-400 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/30 mb-4">
                <span class="text-white font-extrabold text-3xl leading-none mt-1">E</span>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight text-center">Buku Warung</h1>
            <p class="text-sm font-medium text-slate-400 mt-1">Masukkan PIN untuk kelola warung</p>
        </div>

        <!-- Form PIN -->
        <div class="space-y-5">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <!-- Input type password tapi pakai keypad angka (numeric) -->
                <input type="password" inputmode="numeric" id="pinInput" placeholder="Masukkan PIN rahasia..." 
                    class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 outline-none text-center text-lg font-bold tracking-widest transition-all">
            </div>

            <button onclick="cekLogin()" class="w-full bg-gradient-to-r from-emerald-500 to-green-500 text-white font-bold text-lg py-4 rounded-2xl shadow-lg shadow-emerald-500/40 hover:shadow-emerald-500/60 active:scale-[0.98] transition-all duration-300">
                Buka Dashboard
            </button>
        </div>

        <!-- Tombol Kembali -->
        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <a href="index.html" class="inline-flex items-center justify-center gap-2 text-sm font-bold text-slate-400 hover:text-emerald-500 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Kembali ke Mesin Kasir
            </a>
        </div>
    </div>

    <script>
        // Bisa ditekan "Enter" di keyboard untuk login
        document.getElementById("pinInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                cekLogin();
            }
        });

        function cekLogin() {
            const pin = document.getElementById('pinInput').value;
            
            // ==========================================
            // GANTI PIN RAHASIA DI SINI (Sekarang 123456)
            // ==========================================
            if (pin === '123456') {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                alert('❌ PIN Salah! Coba lagi.');
                document.getElementById('pinInput').value = ''; // Kosongkan input jika salah
                document.getElementById('pinInput').focus();
            }
        }
    </script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Service Worker terdaftar!', reg))
                    .catch(err => console.log('PWA Service Worker gagal!', err));
            });
        }
    </script>
</body>
</html>
