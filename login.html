<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Warung Teh Eha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
      <h2 class="text-2xl font-bold text-slate-800 mb-2">Login Owner</h2>
      <p class="text-sm text-slate-500 mb-6">
        Masukkan PIN rahasia untuk masuk ke Dashboard
      </p>

      <input
        type="password"
        id="pinInput"
        placeholder="Masukkan PIN..."
        class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-center text-lg tracking-widest focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none mb-4 transition-all"
      />

      <button
        onclick="cekLogin()"
        class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-emerald-600 transition-colors"
      >
        Masuk
      </button>

      <a
        href="index.html"
        class="block mt-4 text-sm text-slate-400 hover:text-slate-600"
      >
        &larr; Kembali ke Kasir
      </a>
    </div>

    <script>
      function cekLogin() {
        const pin = document.getElementById("pinInput").value;
        // Ganti password di sini
        if (pin === "admin123") {
          // Simpan sesi login
          sessionStorage.setItem("isLoggedIn", "true");
          window.location.href = "dashboard.html";
        } else {
          alert("PIN salah! Akses ditolak.");
        }
      }
    </script>
  </body>
</html>
