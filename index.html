<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir - Warung Teh Eha</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 0px; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .kategori-aktif { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border-color: transparent; box-shadow: 0 4px 15px -3px rgba(16, 185, 129, 0.4); }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(16, 185, 129, 0.1); border-color: #a7f3d0; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 antialiased">

    <nav class="sticky top-0 z-50 glass-nav border-b border-slate-200/60 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="login.html" class="group cursor-pointer flex items-center gap-2">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-gradient-to-tr from-emerald-500 to-green-400 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/30">
                    <span class="text-white font-bold text-lg md:text-xl leading-none mt-0.5">E</span>
                </div>
                <h1 class="text-xl md:text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-green-500 tracking-tight">
                    Teh Eha.
                </h1>
            </a>
            
            <div id="syncStatus" class="bg-white border border-slate-200 text-slate-600 px-3 py-1.5 md:px-4 md:py-2 rounded-full text-xs md:text-sm font-bold shadow-sm flex items-center gap-2 transition-all">
                <svg class="w-4 h-4 animate-spin text-amber-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span class="hidden sm:inline">Memuat...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-4 p-4 mb-24">
        <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
            <div class="w-full lg:w-2/3">
                <div class="relative mb-4 lg:mb-6 group">
                    <div class="absolute inset-y-0 left-0 pl-4 md:pl-5 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 md:w-6 md:h-6 text-slate-400 group-focus-within:text-emerald-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="searchInput" placeholder="Cari nama barang..." onkeyup="debounceSearch()"
                        class="w-full pl-12 pr-4 py-3.5 md:pl-14 md:py-4 rounded-2xl md:rounded-3xl border border-slate-200 shadow-sm bg-white focus:ring-4 focus:ring-emerald-100 focus:border-emerald-400 outline-none text-base md:text-lg font-medium transition-all">
                </div>
                
                <div class="flex gap-2.5 overflow-x-auto pb-4 mb-2 whitespace-nowrap scroll-smooth">
                    <button onclick="pilihKategori('Semua', this)" class="kategori-btn kategori-aktif px-5 py-2.5 md:px-6 md:py-3 rounded-xl md:rounded-2xl border border-transparent font-bold text-xs md:text-sm transition-all duration-300">Semua</button>
                    <button onclick="pilihKategori('Sembako', this)" class="kategori-btn bg-white text-slate-500 hover:bg-slate-50 px-5 py-2.5 md:px-6 md:py-3 rounded-xl md:rounded-2xl border border-slate-200 font-bold text-xs md:text-sm transition-all duration-300">Sembako</button>
                    <button onclick="pilihKategori('Minuman', this)" class="kategori-btn bg-white text-slate-500 hover:bg-slate-50 px-5 py-2.5 md:px-6 md:py-3 rounded-xl md:rounded-2xl border border-slate-200 font-bold text-xs md:text-sm transition-all duration-300">Minuman</button>
                    <button onclick="pilihKategori('Snack', this)" class="kategori-btn bg-white text-slate-500 hover:bg-slate-50 px-5 py-2.5 md:px-6 md:py-3 rounded-xl md:rounded-2xl border border-slate-200 font-bold text-xs md:text-sm transition-all duration-300">Snack</button>
                    <button onclick="pilihKategori('Obat', this)" class="kategori-btn bg-white text-slate-500 hover:bg-slate-50 px-5 py-2.5 md:px-6 md:py-3 rounded-xl md:rounded-2xl border border-slate-200 font-bold text-xs md:text-sm transition-all duration-300">Obat</button>
                    <button onclick="pilihKategori('Kecantikan', this)" class="kategori-btn bg-white text-slate-500 hover:bg-slate-50 px-5 py-2.5 md:px-6 md:py-3 rounded-xl md:rounded-2xl border border-slate-200 font-bold text-xs md:text-sm transition-all duration-300">Kecantikan</button>
                    <button onclick="pilihKategori('Lainnya', this)" class="kategori-btn bg-white text-slate-500 hover:bg-slate-50 px-5 py-2.5 md:px-6 md:py-3 rounded-xl md:rounded-2xl border border-slate-200 font-bold text-xs md:text-sm transition-all duration-300">Lainnya</button>
                </div>
                
                <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 max-h-[55vh] lg:max-h-[65vh] overflow-y-auto pb-4 pt-1 px-1"></div>
            </div>

            <div class="w-full lg:w-1/3 lg:sticky lg:top-24 h-fit">
                <div class="bg-white p-5 md:p-7 rounded-3xl md:rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 relative overflow-hidden">
                    <div class="absolute -right-10 -top-10 w-32 h-32 bg-emerald-50 rounded-full blur-3xl opacity-60"></div>
                    
                    <div class="flex justify-between items-center mb-5 md:mb-6 relative z-10">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-emerald-500 flex items-center justify-center text-white shadow-lg shadow-emerald-500/30 shrink-0">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                            </div>
                            <h3 class="font-extrabold text-xl md:text-2xl text-slate-800 tracking-tight">Keranjang</h3>
                        </div>
                        <span id="badgeCart" class="bg-emerald-50 border border-emerald-100 text-emerald-600 text-xs md:text-sm font-bold px-3 md:px-4 py-1.5 rounded-xl">0 Barang</span>
                    </div>
                    
                    <div id="cartList" class="space-y-3 mb-5 max-h-48 lg:max-h-56 overflow-y-auto pr-2 relative z-10"></div>

                    <div class="relative z-10 mb-5">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <input type="text" id="namaPelanggan" placeholder="Nama Pelanggan (Wajib utk Kasbon)" class="w-full pl-10 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-emerald-400 outline-none text-sm font-bold transition-all placeholder:font-medium placeholder:text-slate-400">
                    </div>

                    <div class="border-t-2 border-dashed border-slate-200 pt-5 md:pt-6 mb-5 md:mb-6 relative z-10">
                        <p class="text-slate-400 text-xs md:text-sm font-bold uppercase tracking-wider mb-1">Total Pembayaran</p>
                        <p id="totalPrice" class="font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-green-500 text-3xl md:text-4xl tracking-tight">Rp 0</p>
                    </div>
                    
                    <div class="flex gap-3 relative z-10">
                        <button id="btnKasbon" onclick="prosesKasbon()" class="w-1/3 bg-amber-50 border border-amber-200 text-amber-600 font-bold text-sm md:text-base py-3.5 rounded-2xl shadow-sm hover:bg-amber-100 active:scale-[0.98] transition-all flex flex-col items-center justify-center gap-1">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg> Kasbon
                        </button>
                        <button id="btnBayar" onclick="prosesPembayaran()" class="w-2/3 bg-gradient-to-r from-emerald-500 to-green-500 text-white font-bold text-base md:text-lg py-3.5 rounded-2xl shadow-lg shadow-emerald-500/40 hover:shadow-emerald-500/60 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Bayar Lunas
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwv8oETI4cDFYp4f2MHQWvMuTKs5ZHpYYqC6EcNavfy4AsM-2ZIIXtvo7iWmc25JfoY/exec';

        let databaseBarang = JSON.parse(localStorage.getItem('db_warung')) || [];
        let cart = [];
        let activeKategori = 'Semua';
        const formatRupiah = (angka) => 'Rp ' + angka.toLocaleString('id-ID');
        const getWaktu = () => new Date().toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }).replace(/\./g, ':');

        async function ambilDataDariCloud() {
            try {
                // TAMBAHAN ANTI-CACHE (Biar HP nggak narik data lama/nyangkut)
                const cacheBuster = "?nocache=" + new Date().getTime();
                const response = await fetch(API_URL + cacheBuster);
                const data = await response.json();
                
                if (data.barang && data.barang.length > 0) {
                    databaseBarang = data.barang;
                    localStorage.setItem('db_warung', JSON.stringify(databaseBarang));
                }
                if (data.riwayat) localStorage.setItem('riwayat_warung', JSON.stringify(data.riwayat));
                
                filterBarang();
                updateStatusUI('<svg class="w-4 h-4 text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>', '<span class="hidden sm:inline">Sinkron</span>');
            } catch (error) {
                updateStatusUI('<svg class="w-4 h-4 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>', '<span class="hidden sm:inline">Offline</span>');
                filterBarang();
            }
        }

        async function simpanKeCloud() {
            updateStatusUI('<svg class="w-4 h-4 text-blue-500 animate-spin shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>', '<span class="hidden sm:inline">Menyimpan...</span>');
            const payload = { action: "simpan_semua", barang: JSON.parse(localStorage.getItem('db_warung')) || [], riwayat: JSON.parse(localStorage.getItem('riwayat_warung')) || [] };
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                updateStatusUI('<svg class="w-4 h-4 text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>', '<span class="hidden sm:inline">Sinkron</span>');
            } catch (error) {
                updateStatusUI('<svg class="w-4 h-4 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>', '<span class="hidden sm:inline">Gagal</span>');
            }
        }

        function updateStatusUI(icon, teks) {
            const el = document.getElementById('syncStatus');
            el.innerHTML = `${icon} ${teks}`;
        }

        function renderProduk(data) {
            const productList = document.getElementById('productList');
            productList.innerHTML = '';
            data.forEach(item => {
                const stokAman = item.stok > 0;
                productList.innerHTML += `
                    <div class="card-hover bg-white p-4 md:p-5 rounded-2xl md:rounded-3xl border ${stokAman ? 'border-slate-100' : 'border-red-100 opacity-60'} flex justify-between items-center transition-all duration-300">
                        <div class="flex-1 pr-2">
                            <h3 class="font-bold text-slate-700 text-sm md:text-lg leading-tight mb-1">${item.nama}</h3>
                            <p class="font-black text-emerald-500 text-base md:text-xl tracking-tight">${formatRupiah(item.harga)}</p>
                            <div class="mt-1.5 inline-block px-2 py-0.5 rounded bg-slate-50 border border-slate-100">
                                <p class="text-[10px] md:text-xs font-semibold ${stokAman ? 'text-slate-400' : 'text-red-500'}">Stok: ${item.stok}</p>
                            </div>
                        </div>
                        <button onclick="tambahKeKeranjang(${item.id})" ${!stokAman ? 'disabled' : ''} 
                            class="${stokAman ? 'bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white shadow-sm' : 'bg-slate-100 text-slate-300'} w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-2xl flex shrink-0 items-center justify-center transition-all duration-300">
                            <svg class="w-6 h-6 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    </div>`;
            });
        }

        function pilihKategori(kategori, btnEl) {
            activeKategori = kategori;
            document.querySelectorAll('.kategori-btn').forEach(btn => {
                btn.className = "kategori-btn bg-white text-slate-500 hover:bg-slate-50 px-5 py-2.5 md:px-6 md:py-3 rounded-xl md:rounded-2xl border border-slate-200 font-bold text-xs md:text-sm transition-all duration-300";
            });
            btnEl.className = "kategori-btn kategori-aktif px-5 py-2.5 md:px-6 md:py-3 rounded-xl md:rounded-2xl border border-transparent font-bold text-xs md:text-sm transition-all duration-300";
            filterBarang();
        }

        let searchTimeout;
        function debounceSearch() {
            clearTimeout(searchTimeout); searchTimeout = setTimeout(filterBarang, 250); 
        }

        function filterBarang() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            renderProduk(databaseBarang.filter(item => (activeKategori === 'Semua' || item.kategori === activeKategori) && item.nama.toLowerCase().includes(keyword)));
        }

        function tambahKeKeranjang(id) {
            const barang = databaseBarang.find(item => parseInt(item.id) === parseInt(id));
            const existingItem = cart.find(item => parseInt(item.id) === parseInt(id));
            if ((existingItem ? existingItem.qty : 0) + 1 > barang.stok) return alert(`Stok ${barang.nama} sisa ${barang.stok}`);
            if (existingItem) existingItem.qty += 1; else cart.push({ ...barang, qty: 1 });
            renderKeranjang();
        }

        function renderKeranjang() {
            const cartList = document.getElementById('cartList');
            let total = 0, totalItems = 0;
            if (cart.length === 0) {
                cartList.innerHTML = `<div class="text-center py-8"><p class="text-slate-400 text-sm md:text-base font-medium">Keranjang kosong</p></div>`;
                document.getElementById('totalPrice').innerText = 'Rp 0'; document.getElementById('badgeCart').innerText = '0 Barang';
                return;
            }

            cartList.innerHTML = '';
            cart.forEach((item, index) => {
                total += item.harga * item.qty; totalItems += item.qty;
                cartList.innerHTML += `
                    <div class="flex justify-between items-center group bg-slate-50 p-2.5 rounded-xl border border-slate-100">
                        <div class="flex-1 pr-2">
                            <h4 class="font-bold text-slate-700 text-xs md:text-sm line-clamp-1">${item.nama}</h4>
                            <p class="text-emerald-500 font-bold text-[10px] md:text-xs mt-0.5">${formatRupiah(item.harga)} <span class="text-slate-400 font-medium ml-1">x${item.qty}</span></p>
                        </div>
                        <div class="flex items-center gap-2 md:gap-3">
                            <span class="font-extrabold text-slate-700 text-xs md:text-sm">${formatRupiah(item.harga * item.qty)}</span>
                            <button onclick="cart.splice(${index}, 1); renderKeranjang();" class="text-red-400 bg-red-50 hover:bg-red-500 hover:text-white w-7 h-7 rounded-lg flex items-center justify-center transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </div>`;
            });
            document.getElementById('totalPrice').innerText = formatRupiah(total);
            document.getElementById('badgeCart').innerText = `${totalItems} Barang`;
        }

        function prosesPembayaran() {
            if (cart.length === 0) return alert("Pilih barang dulu!");
            let namaPelanggan = document.getElementById('namaPelanggan').value.trim();
            if (namaPelanggan === '') namaPelanggan = 'Umum';

            const btn = document.getElementById('btnBayar'); const teksAwal = btn.innerHTML;
            btn.innerHTML = 'Memproses...'; btn.classList.add('opacity-70', 'pointer-events-none');

            let totalTransaksi = 0; let detailItems = [];
            cart.forEach(c => {
                totalTransaksi += (c.harga * c.qty); detailItems.push(`${c.nama} (${c.qty}x)`);
                let dbItem = databaseBarang.find(b => parseInt(b.id) === parseInt(c.id)); if (dbItem) dbItem.stok -= c.qty;
            });
            
            localStorage.setItem('db_warung', JSON.stringify(databaseBarang)); 
            let riwayat = JSON.parse(localStorage.getItem('riwayat_warung')) || [];
            riwayat.unshift({ id: Date.now(), waktu: getWaktu(), tipe: 'Masuk', keterangan: `${namaPelanggan} - ${detailItems.join(', ')}`, nominal: totalTransaksi });
            localStorage.setItem('riwayat_warung', JSON.stringify(riwayat));

            cart = []; document.getElementById('namaPelanggan').value = ''; renderKeranjang(); filterBarang(); simpanKeCloud();

            btn.innerHTML = '✅ Sukses!'; btn.classList.add('bg-green-600');
            setTimeout(() => { btn.innerHTML = teksAwal; btn.classList.remove('opacity-70', 'pointer-events-none', 'bg-green-600'); }, 1500);
        }

        function prosesKasbon() {
            if (cart.length === 0) return alert("Pilih barang dulu!");
            let namaPelanggan = document.getElementById('namaPelanggan').value.trim();
            if (namaPelanggan === '') { document.getElementById('namaPelanggan').focus(); return alert("❌ Nama pelanggan WAJIB diisi kalau mau kasbon!"); }

            const btn = document.getElementById('btnKasbon'); const teksAwal = btn.innerHTML;
            btn.innerHTML = 'Memproses...'; btn.classList.add('opacity-70', 'pointer-events-none');

            let totalTransaksi = 0; let detailItems = [];
            cart.forEach(c => {
                totalTransaksi += (c.harga * c.qty); detailItems.push(`${c.nama} (${c.qty}x)`);
                let dbItem = databaseBarang.find(b => parseInt(b.id) === parseInt(c.id)); if (dbItem) dbItem.stok -= c.qty;
            });
            
            localStorage.setItem('db_warung', JSON.stringify(databaseBarang)); 
            let riwayat = JSON.parse(localStorage.getItem('riwayat_warung')) || [];
            riwayat.unshift({ id: Date.now(), waktu: getWaktu(), tipe: 'Hutang', keterangan: `Kasbon: ${namaPelanggan} - ${detailItems.join(', ')}`, nominal: totalTransaksi });
            localStorage.setItem('riwayat_warung', JSON.stringify(riwayat));

            cart = []; document.getElementById('namaPelanggan').value = ''; renderKeranjang(); filterBarang(); simpanKeCloud();

            btn.innerHTML = '✅ Sukses!'; btn.classList.add('bg-amber-300');
            setTimeout(() => { btn.innerHTML = teksAwal; btn.classList.remove('opacity-70', 'pointer-events-none', 'bg-amber-300'); }, 1500);
        }

        ambilDataDariCloud();
    </script>
    
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Service Worker terdaftar!', reg))
                    .catch(err => console.log('PWA Service Worker gagal!', err));
            });
        }
    </script>
</body>
</html>
