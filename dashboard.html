<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Teh Eha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; overflow: hidden; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .laci-card { background: linear-gradient(135deg, #10b981 0%, #059669 100%); position: relative; overflow: hidden; }
        .laci-card::before { content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px; background: rgba(255,255,255,0.15); border-radius: 50%; filter: blur(20px); }
        .animate-modal-in { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
    <script>if(sessionStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f8fafc] text-slate-800 antialiased flex h-screen w-full">

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 shadow-2xl transform -translate-x-full lg:translate-x-0 transition-transform duration-300 lg:static lg:shadow-none flex flex-col">
        <div class="p-6 flex items-center gap-3 border-b border-slate-100">
            <div class="w-10 h-10 bg-gradient-to-tr from-emerald-500 to-green-400 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/30 shrink-0">
                <span class="text-white font-bold text-xl leading-none mt-0.5">E</span>
            </div>
            <h1 class="text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-green-500 tracking-tight leading-tight">
                Buku<br>Warung.
            </h1>
        </div>

        <div class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <p class="px-3 text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Menu Utama</p>
            <button onclick="switchMenu('view-keuangan', this)" class="menu-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl bg-emerald-500 text-white font-bold transition-all text-left shadow-lg shadow-emerald-500/30">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-sm">Keuangan & Riwayat</span>
            </button>
            <button onclick="switchMenu('view-stok', this)" class="menu-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 hover:bg-emerald-50 hover:text-emerald-600 font-bold transition-all text-left">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                <span class="text-sm">Kelola Data Barang</span>
            </button>
        </div>

        <div class="p-4 border-t border-slate-100 space-y-2">
            <a href="index.html" class="w-full flex items-center justify-center gap-2 px-4 py-3.5 rounded-2xl bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 transition-all text-sm">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Buka Mesin Kasir
            </a>
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3.5 rounded-2xl bg-white text-red-500 font-bold hover:bg-red-50 transition-all text-sm border border-slate-200">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg> Keluar (Logout)
            </button>
        </div>
    </aside>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 lg:hidden transition-opacity"></div>

    <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="lg:hidden bg-white/80 backdrop-blur-md border-b border-slate-200/60 p-4 sticky top-0 z-30 flex justify-between items-center shadow-sm">
            <button onclick="toggleSidebar()" class="p-2 -ml-2 bg-emerald-50 rounded-xl text-emerald-600 hover:bg-emerald-100 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h7"></path></svg>
            </button>
            <div id="syncStatus" class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1.5 shadow-inner">
                <svg class="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Sinkron...
            </div>
        </header>

        <div class="hidden lg:flex justify-end p-4 absolute top-0 right-0 z-30 pointer-events-none">
            <div id="syncStatusDesktop" class="bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 shadow-sm pointer-events-auto">
                <svg class="w-4 h-4 animate-spin text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Sinkronisasi Cloud...
            </div>
        </div>

        <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-10 pb-24">
            
            <section id="view-keuangan" class="block space-y-6 max-w-3xl mx-auto">
                <h2 class="text-2xl font-extrabold text-slate-800 mb-2">Keuangan Hari Ini</h2>
                <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100">
                    <div class="laci-card p-6 md:p-8 rounded-3xl shadow-lg shadow-emerald-500/30 text-white mb-6">
                        <p class="text-emerald-50 text-sm font-bold uppercase tracking-wider mb-1 opacity-90">Sisa Uang di Laci</p>
                        <p id="txtLaci" class="font-black text-4xl md:text-5xl tracking-tight relative z-10">Rp 0</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-emerald-50 p-4 md:p-5 rounded-2xl border border-emerald-100">
                            <p class="text-[10px] md:text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1">Pemasukan</p>
                            <p id="txtMasuk" class="font-black text-emerald-700 text-lg md:text-xl">Rp 0</p>
                        </div>
                        <div class="bg-red-50 p-4 md:p-5 rounded-2xl border border-red-100">
                            <p class="text-[10px] md:text-xs font-bold text-red-600 uppercase tracking-wider mb-1">Pengeluaran</p>
                            <p id="txtKeluar" class="font-black text-red-700 text-lg md:text-xl">Rp 0</p>
                        </div>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <button onclick="catatPengeluaran()" class="flex-1 flex items-center justify-center gap-2 bg-white border-2 border-slate-200 text-slate-600 font-bold py-3.5 rounded-2xl hover:border-emerald-300 hover:bg-emerald-50 hover:text-emerald-600 transition-all text-sm md:text-base">
                            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg> Catat Pengeluaran
                        </button>
                        <button onclick="resetKas()" class="sm:w-1/3 text-red-500 border border-slate-200 hover:border-red-200 font-bold py-3 rounded-2xl text-sm hover:bg-red-50 transition-all">
                            Reset ke 0
                        </button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-10 h-10 rounded-xl bg-emerald-500 flex items-center justify-center text-white shadow-lg shadow-emerald-500/30 shrink-0">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <h3 class="font-extrabold text-lg text-slate-800">Riwayat Transaksi</h3>
                    </div>
                    <div id="riwayatList" class="space-y-4 max-h-[40vh] overflow-y-auto pr-1"></div>
                </div>
            </section>

            <section id="view-stok" class="hidden space-y-6 max-w-4xl mx-auto">
                <h2 class="text-2xl font-extrabold text-slate-800 mb-2">Database Barang</h2>
                
                <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 relative overflow-hidden">
                    <div class="absolute -right-10 -top-10 w-32 h-32 bg-emerald-50 rounded-full blur-3xl opacity-60"></div>
                    
                    <div class="flex items-center gap-3 mb-5 relative z-10">
                        <div class="w-10 h-10 rounded-xl bg-emerald-500 flex items-center justify-center text-white shadow-lg shadow-emerald-500/30 shrink-0">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                        </div>
                        <h3 class="font-extrabold text-lg text-slate-800">Barang Baru</h3>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 relative z-10">
                        <input type="text" id="newNama" placeholder="Nama Barang..." class="px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 outline-none font-medium transition-all">
                        <select id="newKategori" class="px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 outline-none font-bold text-slate-600 transition-all">
                            <option value="Sembako">Sembako</option><option value="Minuman">Minuman</option><option value="Snack">Snack</option><option value="Lainnya">Lainnya</option>
                        </select>
                        <input type="text" inputmode="numeric" id="newHarga" placeholder="Harga Jual (Cth: 15000)" class="px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 outline-none font-medium transition-all">
                        <input type="text" inputmode="numeric" id="newStok" placeholder="Jumlah Stok Awal" class="px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 outline-none font-bold transition-all">
                    </div>
                    
                    <button id="btnSimpanBarangBaru" onclick="tambahBarang()" class="relative z-10 w-full bg-gradient-to-r from-emerald-500 to-green-500 text-white font-bold text-base md:text-lg py-4 rounded-2xl shadow-lg shadow-emerald-500/40 hover:shadow-emerald-500/60 active:scale-[0.98] transition-all duration-300">
                        Simpan ke Sistem
                    </button>
                </div>

                <div class="bg-white p-4 md:p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 h-full">
                    <div class="flex items-center gap-3 mb-5 ml-2">
                        <div class="w-10 h-10 rounded-xl bg-emerald-500 flex items-center justify-center text-white shadow-lg shadow-emerald-500/30 shrink-0">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                        </div>
                        <h3 class="font-extrabold text-lg text-slate-800">Data & Stok</h3>
                    </div>
                    <div id="stockManagementList" class="grid grid-cols-1 gap-4 max-h-[60vh] overflow-y-auto pr-1"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="modalEdit" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[60] flex items-center justify-center p-4 transition-all duration-300">
        <div class="bg-white rounded-[2rem] p-6 md:p-8 w-full max-w-sm shadow-2xl animate-modal-in border border-slate-100 relative overflow-hidden">
            <h3 class="font-extrabold text-xl text-slate-800 mb-6 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-500 flex items-center justify-center text-white shadow-md shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                </div> Edit Data
            </h3>
            <input type="hidden" id="editId">
            <div class="space-y-4 mb-8">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Nama</label>
                    <input type="text" id="editNama" class="w-full mt-1.5 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none font-medium">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Kategori</label>
                        <select id="editKategori" class="w-full mt-1.5 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none font-bold text-slate-600">
                            <option value="Sembako">Sembako</option><option value="Minuman">Minuman</option><option value="Snack">Snack</option><option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Stok</label>
                        <input type="text" inputmode="numeric" id="editStok" class="w-full mt-1.5 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none font-bold text-center">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Harga Jual</label>
                    <input type="text" inputmode="numeric" id="editHarga" class="w-full mt-1.5 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none font-bold text-blue-600 text-lg">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="tutupModal()" class="w-1/3 bg-slate-100 text-slate-500 font-bold py-3.5 rounded-2xl hover:bg-slate-200">Batal</button>
                <button id="btnSimpanEdit" onclick="simpanEdit()" class="w-2/3 bg-blue-600 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-blue-500/30 hover:bg-blue-700">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwv8oETI4cDFYp4f2MHQWvMuTKs5ZHpYYqC6EcNavfy4AsM-2ZIIXtvo7iWmc25JfoY/exec';
        const formatRupiah = (angka) => 'Rp ' + angka.toLocaleString('id-ID');
        let databaseBarang = JSON.parse(localStorage.getItem('db_warung')) || [];

        // ==== UI LOGIC (Sidebar & Menu) ====
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        function switchMenu(viewId, btnEl) {
            document.getElementById('view-keuangan').classList.add('hidden');
            document.getElementById('view-stok').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
            document.getElementById(viewId).classList.add('block');
            
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-500', 'text-white', 'shadow-lg', 'shadow-emerald-500/30');
                btn.classList.add('text-slate-500');
            });
            btnEl.classList.remove('text-slate-500');
            btnEl.classList.add('bg-emerald-500', 'text-white', 'shadow-lg', 'shadow-emerald-500/30');
            
            if(window.innerWidth < 1024) toggleSidebar();
        }

        // ==== CLOUD SYNC ====
        async function ambilDataDariCloud() {
            try {
                const res = await fetch(API_URL); const data = await res.json();
                if (data.barang && data.barang.length > 0) { databaseBarang = data.barang; localStorage.setItem('db_warung', JSON.stringify(databaseBarang)); }
                if (data.riwayat) localStorage.setItem('riwayat_warung', JSON.stringify(data.riwayat));
                updateStatusUI('<svg class="w-4 h-4 text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>', 'Tersinkron');
                renderManajemenStok(); muatKeuangan();
            } catch (err) {
                updateStatusUI('<svg class="w-4 h-4 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>', 'Offline');
                renderManajemenStok(); muatKeuangan();
            }
        }

        async function simpanKeCloud() {
            updateStatusUI('<svg class="w-4 h-4 text-blue-500 animate-spin shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>', 'Menyimpan...');
            const payload = { action: "simpan_semua", barang: JSON.parse(localStorage.getItem('db_warung')) || [], riwayat: JSON.parse(localStorage.getItem('riwayat_warung')) || [] };
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                updateStatusUI('<svg class="w-4 h-4 text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>', 'Tersinkron');
            } catch (err) { updateStatusUI('<svg class="w-4 h-4 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>', 'Gagal'); }
        }

        function updateStatusUI(icon, teks) {
            ['syncStatus', 'syncStatusDesktop'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.className = `${id === 'syncStatusDesktop' ? 'bg-white shadow-sm border border-slate-200' : 'bg-slate-50 border border-slate-200'} px-3 py-1.5 md:px-4 md:py-2 rounded-full text-xs md:text-sm font-bold flex items-center gap-2 text-slate-600 transition-all`;
                    el.innerHTML = `${icon} <span class="${id === 'syncStatus' ? 'hidden sm:inline' : ''}">${teks}</span>`;
                }
            });
        }

        // ==== LOGIKA DASHBOARD ====
        function muatKeuangan() {
            let masuk = parseInt(localStorage.getItem('uang_masuk')) || 0;
            let keluar = parseInt(localStorage.getItem('uang_keluar')) || 0;
            document.getElementById('txtMasuk').innerText = formatRupiah(masuk);
            document.getElementById('txtKeluar').innerText = formatRupiah(keluar);
            document.getElementById('txtLaci').innerText = formatRupiah(masuk - keluar);
            renderRiwayat();
        }

        async function catatPengeluaran() {
            let nomInput = prompt("Nominal pengeluaran (contoh: 15000):");
            if(!nomInput) return;
            let nom = parseInt(nomInput.replace(/[^0-9]/g, ''));
            if(isNaN(nom) || nom <= 0) return alert("❌ Nominal harus angka yang benar!");
            
            let ket = prompt("Uang keluar untuk apa?"); if(!ket) return;
            localStorage.setItem('uang_keluar', (parseInt(localStorage.getItem('uang_keluar')) || 0) + nom);
            let rw = JSON.parse(localStorage.getItem('riwayat_warung')) || [];
            rw.unshift({ id: Date.now(), waktu: new Date().toLocaleString('id-ID', { hour:'2-digit', minute:'2-digit' }), tipe: 'Keluar', keterangan: ket, nominal: nom });
            localStorage.setItem('riwayat_warung', JSON.stringify(rw));
            muatKeuangan(); await simpanKeCloud();
        }

        function renderRiwayat() {
            const container = document.getElementById('riwayatList');
            let rw = JSON.parse(localStorage.getItem('riwayat_warung')) || [];
            if(rw.length === 0) return container.innerHTML = `<p class="text-center text-slate-400 text-sm py-4">Belum ada transaksi</p>`;
            container.innerHTML = '';
            rw.forEach(log => {
                let isMas = log.tipe === 'Masuk';
                container.innerHTML += `
                    <div class="flex justify-between items-start border-b border-slate-50 pb-3 last:border-0">
                        <div class="pr-2"><p class="text-[10px] md:text-xs font-bold text-slate-400">${log.waktu}</p><p class="text-xs md:text-sm font-bold text-slate-700">${log.keterangan}</p></div>
                        <span class="font-black text-xs md:text-sm ${isMas ? 'text-emerald-500' : 'text-red-500'}">${isMas ? '+' : '-'}${formatRupiah(log.nominal)}</span>
                    </div>`;
            });
        }

        function renderManajemenStok() {
            const container = document.getElementById('stockManagementList');
            container.innerHTML = '';
            databaseBarang.forEach(item => {
                container.innerHTML += `
                    <div class="bg-slate-50 p-4 md:p-5 rounded-2xl md:rounded-3xl border border-slate-100 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                        <div class="flex-1">
                            <span class="text-[10px] bg-white border border-slate-200 text-slate-500 px-2.5 py-1 rounded-md font-bold uppercase">${item.kategori}</span>
                            <p class="text-sm md:text-base font-bold text-slate-800 mt-2 line-clamp-1">${item.nama}</p>
                            <div class="flex items-center gap-3 mt-1">
                                <p class="text-sm md:text-base font-black text-emerald-500">${formatRupiah(item.harga)}</p>
                                <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                                <p class="text-[10px] md:text-xs font-bold ${item.stok <= 5 ? 'text-red-500' : 'text-slate-500'}">Stok: ${item.stok}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="text" inputmode="numeric" id="tambahStok_${item.id}" placeholder="+ Jml" class="w-16 md:w-20 p-2.5 md:p-3 text-xs md:text-sm rounded-xl md:rounded-2xl border border-slate-200 bg-white text-center outline-none focus:border-emerald-500 font-bold">
                            <button onclick="updateStok(${item.id})" class="bg-slate-200 text-slate-600 font-bold px-3 md:px-4 py-2.5 md:py-3 rounded-xl md:rounded-2xl hover:bg-slate-300 text-xs md:text-sm transition-colors">Up</button>
                            <button onclick="bukaModal(${item.id})" class="bg-white border border-slate-200 text-blue-500 font-bold p-2.5 md:p-3 rounded-xl md:rounded-2xl hover:bg-blue-50 transition-colors">
                                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="hapusBarang(${item.id})" class="bg-white border border-slate-200 text-red-400 font-bold p-2.5 md:p-3 rounded-xl md:rounded-2xl hover:bg-red-50 hover:text-red-500 transition-colors">
                                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>`;
            });
        }

        // ==== LOGIKA FORM TAMBAH & EDIT (KEBAL HP) ====
        async function tambahBarang() {
            const btn = document.getElementById('btnSimpanBarangBaru');
            
            const nama = document.getElementById('newNama').value.trim();
            const kat = document.getElementById('newKategori').value;
            // Filter hanya angka, biar ibu nggak sengaja ngetik spasi/titik di HP
            const hrgStr = document.getElementById('newHarga').value.replace(/[^0-9]/g, '');
            const stkStr = document.getElementById('newStok').value.replace(/[^0-9]/g, '');
            
            const hrg = parseInt(hrgStr);
            const stk = parseInt(stkStr);

            if(!nama) return alert("❌ Nama barang belum diisi!");
            if(isNaN(hrg) || hrg <= 0) return alert("❌ Harga barang harus angka valid!");
            if(isNaN(stk)) return alert("❌ Stok barang belum diisi!");

            // Animasi loading
            const textAwal = btn.innerHTML;
            btn.innerHTML = '⏳ Menyimpan...';
            btn.classList.add('opacity-70', 'pointer-events-none');

            databaseBarang.push({ id: Math.floor(Math.random()*1000000), nama, kategori: kat, harga: hrg, stok: stk });
            localStorage.setItem('db_warung', JSON.stringify(databaseBarang)); 
            
            document.getElementById('newNama').value=''; document.getElementById('newHarga').value=''; document.getElementById('newStok').value=''; 
            renderManajemenStok(); 
            
            await simpanKeCloud();

            btn.innerHTML = '✅ Berhasil!';
            setTimeout(() => {
                btn.innerHTML = textAwal;
                btn.classList.remove('opacity-70', 'pointer-events-none');
            }, 1500);
        }

        async function updateStok(id) {
            let inputEl = document.getElementById(`tambahStok_${id}`);
            // Bisa menerima minus jika diketik manual '-'
            let jml = parseInt(inputEl.value.replace(/[^0-9\-]/g, '')); 
            if (isNaN(jml) || jml === 0) return alert("❌ Masukkan angka stok yang benar!");

            let b = databaseBarang.find(b => parseInt(b.id) === parseInt(id));
            if (b) { 
                b.stok = Math.max(0, b.stok + jml); 
                localStorage.setItem('db_warung', JSON.stringify(databaseBarang)); 
                inputEl.value=''; 
                renderManajemenStok(); 
                await simpanKeCloud(); 
            }
        }

        function bukaModal(id) {
            let item = databaseBarang.find(b => parseInt(b.id) === parseInt(id));
            if(item) {
                document.getElementById('editId').value = item.id; 
                document.getElementById('editNama').value = item.nama; 
                document.getElementById('editKategori').value = item.kategori || 'Sembako';
                document.getElementById('editHarga').value = item.harga; 
                document.getElementById('editStok').value = item.stok;
                document.getElementById('modalEdit').classList.remove('hidden');
            }
        }
        function tutupModal() { document.getElementById('modalEdit').classList.add('hidden'); }

        async function simpanEdit() {
            const btn = document.getElementById('btnSimpanEdit');
            let id = parseInt(document.getElementById('editId').value);
            let nama = document.getElementById('editNama').value.trim();
            let kat = document.getElementById('editKategori').value;
            let hrg = parseInt(document.getElementById('editHarga').value.replace(/[^0-9]/g, ''));
            let stk = parseInt(document.getElementById('editStok').value.replace(/[^0-9]/g, ''));
            
            if(!nama || isNaN(hrg) || isNaN(stk)) return alert("❌ Pastikan Nama, Harga, dan Stok diisi angka yang benar!");
            
            let i = databaseBarang.findIndex(b => parseInt(b.id) === id);
            if(i !== -1) { 
                btn.innerHTML = 'Menyimpan...';
                databaseBarang[i].nama = nama; databaseBarang[i].kategori = kat; databaseBarang[i].harga = hrg; databaseBarang[i].stok = Math.max(0, stk); 
                localStorage.setItem('db_warung', JSON.stringify(databaseBarang)); 
                renderManajemenStok(); 
                
                await simpanKeCloud();
                
                btn.innerHTML = 'Simpan';
                tutupModal(); 
            }
        }

        async function hapusBarang(id) {
            if(confirm('Yakin hapus data barang ini dari sistem?')) { 
                databaseBarang = databaseBarang.filter(b => parseInt(b.id) !== parseInt(id)); 
                localStorage.setItem('db_warung', JSON.stringify(databaseBarang)); 
                renderManajemenStok(); 
                await simpanKeCloud(); 
            }
        }

        async function resetKas() {
            if(confirm("Buku warung akan di-reset jadi 0?\nSemua riwayat hari ini akan terhapus.")) { 
                localStorage.setItem('uang_masuk', '0'); 
                localStorage.setItem('uang_keluar', '0'); 
                localStorage.setItem('riwayat_warung', '[]'); 
                muatKeuangan(); 
                await simpanKeCloud(); 
            }
        }

        function logout() { sessionStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; }

        ambilDataDariCloud();
    </script>
</body>
</html>
